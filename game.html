<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack-a-Quail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Grenze:wght@400;500;600;700&family=Grenze+Gotisch:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1E7D7;--paper-2:#EADCC6;--paper-edge:#DECBAC;
    --red:#C42E25;--red-deep:#9E241C;--gold:#D29A2E;--gold-deep:#A9781C;
    --ink:#1C140F;--ink-soft:#5A4A3A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Grenze',Georgia,serif;background:var(--paper);color:var(--ink);
    line-height:1.5;min-height:100vh;
    background-image:
      radial-gradient(circle at 18% 8%, rgba(0,0,0,0.035), transparent 42%),
      radial-gradient(circle at 85% 80%, rgba(0,0,0,0.045), transparent 46%);
    -webkit-user-select:none;user-select:none;
  }
  .wrap{max-width:440px;margin:0 auto;padding:24px 20px 60px;text-align:center}
  .back{display:inline-block;font-size:14px;text-transform:uppercase;letter-spacing:2px;color:var(--red-deep);text-decoration:none;font-weight:700;margin-bottom:14px}
  h1{font-family:'Grenze Gotisch',serif;font-weight:700;font-size:clamp(38px,11vw,60px);line-height:1;color:var(--ink)}
  .tag{font-style:italic;color:var(--ink-soft);font-size:17px;margin:4px 0 18px}

  .hud{display:flex;justify-content:center;gap:10px;margin-bottom:18px}
  .stat{border:2px solid var(--ink);background:var(--paper-2);padding:8px 14px;min-width:84px}
  .stat .lbl{text-transform:uppercase;letter-spacing:1.5px;font-size:10px;font-weight:700;color:var(--red-deep)}
  .stat .val{font-family:'Grenze Gotisch',serif;font-weight:700;font-size:26px;line-height:1;color:var(--ink)}

  .board{position:relative;max-width:360px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .hole{
    aspect-ratio:1;border-radius:50%;position:relative;overflow:hidden;cursor:pointer;
    background:radial-gradient(circle at 50% 32%, #7a674d, #2a2118 72%);
    border:3px solid var(--ink);box-shadow:inset 0 -7px 12px rgba(0,0,0,.45)}
  .quail{
    position:absolute;left:8%;bottom:0;width:84%;height:84%;object-fit:cover;border-radius:50%;
    transform:translateY(118%);transition:transform .12s ease-out;pointer-events:none;
    border:2px solid var(--ink)}
  .hole.up .quail{transform:translateY(6%)}
  .hole.bonked .quail{transform:translateY(118%) rotate(22deg);transition:transform .09s}
  .hole::after{content:"";position:absolute;left:6%;right:6%;bottom:0;height:22%;
    background:linear-gradient(rgba(42,33,24,0),rgba(42,33,24,.85));pointer-events:none}

  .btn{display:inline-block;margin-top:22px;background:var(--red);color:var(--paper);
    font-family:'Grenze',serif;text-transform:uppercase;letter-spacing:2px;font-size:15px;font-weight:700;
    padding:12px 26px;border:2px solid var(--ink);cursor:pointer;
    box-shadow:4px 4px 0 var(--ink);transition:transform .1s, box-shadow .1s}
  .btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}

  .overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(241,231,215,.94);border-radius:6px;z-index:5}
  .overlay.show{display:flex}
  .overlay .go{font-family:'Grenze Gotisch',serif;font-weight:700;font-size:34px;color:var(--red)}
  .overlay .final{font-size:20px;margin:6px 0 2px}
  .overlay .final b{font-family:'Grenze Gotisch',serif;font-size:30px;color:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">&larr; Back to the plan</a>
  <h1>Whack-a-Quail</h1>
  <div class="tag">He keeps popping up. Sort him out. 20 seconds on the clock.</div>

  <div class="hud">
    <div class="stat"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
    <div class="stat"><div class="lbl">Time</div><div class="val" id="time">20</div></div>
    <div class="stat"><div class="lbl">Best</div><div class="val" id="best">0</div></div>
  </div>

  <div class="board" id="board">
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
    <div class="overlay" id="overlay">
      <div class="go">Time!</div>
      <div class="final">You whacked <b id="final">0</b></div>
      <button class="btn" id="again">Play again</button>
    </div>
  </div>

  <button class="btn" id="start">Start</button>
</div>

  var holes = Array.prototype.slice.call(document.querySelectorAll('.hole'));
  var scoreEl=document.getElementById('score'), timeEl=document.getElementById('time'),
      bestEl=document.getElementById('best'), finalEl=document.getElementById('final'),
      overlay=document.getElementById('overlay'), startBtn=document.getElementById('start'),
      againBtn=document.getElementById('again');

  var score=0, best=0, timeLeft=20, active=false, popTimer=null, tickTimer=null;

  holes.forEach(function(h){
    var img=document.createElement('img');
    img.className='quail'; img.src=QUAIL_IMG; img.alt='Quail';
    h.appendChild(img);
    h.addEventListener('click', function(){ whack(h); });
  });

  function rand(min,max){ return Math.floor(Math.random()*(max-min))+min; }

  function popRandom(){
    if(!active) return;
    var down = holes.filter(function(h){ return !h.classList.contains('up'); });
    var elapsed = 20 - timeLeft;
    if(down.length){
      var h = down[rand(0,down.length)];
      h.classList.add('up');
      var maxLife = Math.max(470, 1100 - elapsed*34);
      var life = rand(420, maxLife);
      setTimeout(function(){ h.classList.remove('up'); }, life);
    }
    // ramps gently early, then accelerates hard in the final seconds
    var gap = Math.max(220, 850 - Math.round(elapsed*elapsed*1.7));
    popTimer = setTimeout(popRandom, rand(Math.round(gap*0.55), gap));
  }

  function whack(h){
    if(!active || !h.classList.contains('up') || h.classList.contains('bonked')) return;
    score++; scoreEl.textContent=score;
    h.classList.add('bonked'); h.classList.remove('up');
    setTimeout(function(){ h.classList.remove('bonked'); }, 300);
  }

  function tick(){
    timeLeft--; timeEl.textContent = timeLeft < 0 ? 0 : timeLeft;
    if(timeLeft <= 0) endGame();
  }

  function start(){
    score=0; timeLeft=20; active=true;
    scoreEl.textContent='0'; timeEl.textContent='20';
    overlay.classList.remove('show');
    startBtn.style.display='none';
    tickTimer=setInterval(tick,1000);
    popRandom();
  }

  function endGame(){
    active=false;
    clearTimeout(popTimer); clearInterval(tickTimer);
    holes.forEach(function(h){ h.classList.remove('up'); });
    if(score>best){ best=score; }
    bestEl.textContent=best;
    finalEl.textContent=score;
    overlay.classList.add('show');
  }

  startBtn.addEventListener('click', start);
  againBtn.addEventListener('click', start);
</script>
</body>
</html>
